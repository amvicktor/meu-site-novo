<html>
    <head>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: rgb(162, 0, 255);
            }

            a{
                text-decoration: none;
            }

            .box {
                font-size: 40px;
                color: rgb(255, 255, 255);
                height: 350px;
                width: 450;
                border-radius: 30px;
                background: #191919;
                flex-direction: column;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .button-container {
                display: flex;
                justify-content: space-around;
                height: 50px;
                width: 150px;

            }
            button {
                height: 40px;
                width: 70px;
                background: rgb(255, 255, 255);
                border-radius: 10px;
                color: rgb(22, 22, 22);
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <div class = "box">
            <p>O Vicktor é o melhor?</p>
            <div class ="buttons-container">
                <button>
                    <a href="https://www.youtube.com/watch?v=C6BkbT1uvN4">Sim</a>
                </button>
                <button id= "no">Não</button>
            </div>
        </div>
    </body>
    <script>
    let button = document.getElementById('no');
    let height = window.innerHeight - 50;
    let width = window.innerHeight - 50;

    button.addEventListener('mouseover', function(){
        button.style.position = "absolute";
        button.style.top = Math.random() * height + "px";
        button.style.left = Math.random() * height + "px";
    })
    </script>
</html>
